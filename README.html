<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<style>
  /* --- עיצוב Header וניווט --- */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 10000;
  }

  /* כפתור המבורגר - עיגול זכוכית */
  .menu-toggle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
  }

  /* פסים - 2 בלבד */
  .menu-toggle span {
    background: white;
    height: 2px;
    border-radius: 2px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .menu-toggle span:nth-child(1) { width: 25px; }
  .menu-toggle span:nth-child(2) { width: 15px; margin-right: -10px; }

  /* אנימציית X */
  .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); width: 25px; }
  .menu-toggle.active span:nth-child(2) { transform: rotate(-45deg) translate(4px, -4px); width: 25px; }

  /* פאנל התפריט VisionOS */
  .nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    height: 100vh;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(30px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 30px;
    transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .nav-links.active { right: 0; }

  .nav-link { color: white; text-decoration: none; font-size: 22px; opacity: 0; transition: 0.5s; }
  .nav-links.active .nav-link { opacity: 1; }

  /* כפתור בניית נכס - בשורה אחת */
  .nav-cta {
    padding: 10px 20px;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header class="nav" id="nav">
  <a href="#top" class="brand">CORE<b>DIGITAL</b></a>
  
  <!-- כפתור בניית נכס בשורה אחת עם המבורגר -->
  <div style="display: flex; align-items: center; gap: 15px;">
    <a href="#contact" class="nav-cta">בניית נכס דיגיטלי ←</a>
    <button class="menu-toggle" id="menuToggle">
      <span></span><span></span>
    </button>
  </div>

  <nav class="nav-links" id="navLinks">
    <a href="#story" class="nav-link">החזון שלנו</a>
    <a href="#services" class="nav-link">שירותים</a>
    <a href="#work" class="nav-link">עבודות מהפנטות</a>
    <a href="#process" class="nav-link">אסטרטגיה</a>
  </nav>
</header>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');

  menuToggle.addEventListener('click', () => {
    menuToggle.classList.toggle('active');
    navLinks.classList.toggle('active');
  });
</script>

</body>
</html>
