<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>מתקן ג׳יבריש</title>
<style>
    body {
        font-family: Arial;
        direction: rtl;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .box {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    textarea {
        width: 100%;
        height: 120px;
        border-radius: 10px;
        border: none;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    .result {
        margin-top: 15px;
        background: #020617;
        padding: 10px;
        border-radius: 10px;
        min-height: 40px;
    }
</style>
</head>
<body>

<div class="box">
    <h2>מתקן ג׳יבריש עברית / אנגלית</h2>
    <textarea id="input" placeholder="תדביק פה טקסט בג׳יבריש..."></textarea>
    <button onclick="convert()">תקן לי</button>
    <div class="result" id="output"></div>
</div>

<script>
const map = {
    q: '/', w: "'", e: 'ק', r: 'ר', t: 'א', y: 'ט', u: 'ו', i: 'ן', o: 'ם', p: 'פ',
    a: 'ש', s: 'ד', d: 'ג', f: 'כ', g: 'ע', h: 'י', j: 'ח', k: 'ל', l: 'ך',
    z: 'ז', x: 'ס', c: 'ב', v: 'ה', b: 'נ', n: 'מ', m: 'צ',
    ',': 'ת', '.': 'ץ', ';': 'ף'
};

function convert() {
    let text = document.getElementById("input").value;
    let result = "";

    for (let char of text) {
        let lower = char.toLowerCase();
        if (map[lower]) {
            result += map[lower];
        } else {
            result += char;
        }
    }

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
